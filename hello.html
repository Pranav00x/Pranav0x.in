<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello | Pranav</title>
  <style>
    :root {
      --bg: #f6f6f0;
      --panel: #ffffff;
      --ink: #111111;
      --muted: #3d3d3d;
      --border: 2px solid var(--ink);
      --shadow: 8px 8px 0 var(--ink);
      --pad: clamp(16px, 4vw, 28px);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.55; }
    a { color: inherit; text-decoration-thickness: 2px; text-underline-offset: 3px; }
    a:hover { background: #111; color: #fff; text-decoration: none; }
    main { max-width: 760px; margin: 0 auto; padding: 56px var(--pad); }
    .panel { background: var(--panel); border: var(--border); box-shadow: var(--shadow); padding: 22px; }
    h1 { font-size: clamp(2.2rem, 6vw, 3rem); letter-spacing: -0.04em; }
    p { margin-top: 10px; color: var(--muted); }
    .sig { margin-top: 18px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Hello.</h1>
      <p>This page exists. The site lives on the homepage.</p>
      <div class="sig"><a href="./index.html">→ Go to `index.html`</a></div>
    </section>
  </main>
</body>
</html>
